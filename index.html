<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Lanka Independence Day</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background animation -->
    <div class="flag-bg"></div>

    <header>
        <h1>🇱🇰 Sri Lanka Independence Day</h1>
        <p>Celebrating Freedom Since February 4, 1948</p>
    </header>

    <section class="hero">
        <h2 id="countdown"></h2>

        <!-- Anthem Button -->
        <button onclick="playAnthem()">▶ Play National Anthem</button>
        <button onclick="pauseAnthem()">⏸ Pause</button>
    </section>

    <section class="content">
        <h2>History</h2>
        <p>
            Sri Lanka gained independence from British rule on February 4, 1948.
        </p>

        <h2>Why It Matters</h2>
        <p>
            Celebrated with parades, culture, and national pride.
        </p>
    </section>

    <footer>
        <p>Made with ❤️ for Sri Lanka</p>
    </footer>

    <!-- Anthem Audio -->
    <audio id="anthem">
        <!-- Replace this with your own MP3 file -->
        <source src="sri-lanka-anthem.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
